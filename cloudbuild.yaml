# Cloud Run deploy for seamvex-website (europe-west1).
#
# IMPORTANT — this file is used ONLY when the Cloud Build trigger is configured as:
#   Configuration: Cloud Build configuration file → /cloudbuild.yaml
# Cloud Run "Connect repository" (Dockerfile-only) does NOT read this file.
# If using Connect repository instead, set in the wizard:
#   Region europe-west1 · Port 8080 · Allow unauthenticated · Ingress All
# Do NOT create a second service in europe-west2.

substitutions:
  _REGION: europe-west1
  _SERVICE: seamvex-website

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --ingress
      - all
      - --port
      - "8080"
      - --min-instances
      - "0"
      - --max-instances
      - "10"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
