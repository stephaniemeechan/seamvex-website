# Cloud Run deploy for seamvex-website-2 (europe-west1).
#
# Used when the Cloud Build trigger is configured as:
#   Configuration: Cloud Build configuration file → /cloudbuild.yaml
#   Region: europe-west1 · Service: seamvex-website-2
#
# Cloud Run "Connect repository" (Dockerfile-only) does NOT read this file.
# It creates its own trigger and may deploy to a different service/region.
#
# Git push deploys when Cloud Build trigger is configured (see deploy/setup-cloud-build-trigger.ps1).

substitutions:
  _REGION: europe-west1
  _SERVICE: seamvex-website-2
  _CLOUDSQL: exalted-splicer-499401-e2:europe-west1:free-trial-first-project

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --ingress
      - all
      - --port
      - "8080"
      - --min-instances
      - "0"
      - --max-instances
      - "10"
      - --add-cloudsql-instances
      - ${_CLOUDSQL}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
