# Cloud Run deploy for seamvex-website-2 (europe-west1).
#
# Used when the Cloud Build trigger is configured as:
#   Configuration: Cloud Build configuration file → /cloudbuild.yaml
#   Region: europe-west1 · Service: seamvex-website-2
#
# Cloud Run "Connect repository" (Dockerfile-only) does NOT read this file.
# It creates its own trigger and may deploy to a different service/region.
#
# After git push, run deploy/deploy-live.ps1 to update live seamvex-website-2.
# Fix long-term: create a trigger that uses this file for seamvex-website-2 (see docs/DEPLOY.md).
#
# Cloud SQL is NOT attached by this deploy step. Run deploy/apply-prod-env.ps1 once
# (or add --add-cloudsql-instances) so DATABASE_URL socket works.

substitutions:
  _REGION: europe-west1
  _SERVICE: seamvex-website-2

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --ingress
      - all
      - --port
      - "8080"
      - --min-instances
      - "0"
      - --max-instances
      - "10"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
