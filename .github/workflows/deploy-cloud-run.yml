# Deploy seamvex-website-2 on every push to main.
#
# ONE-TIME SETUP: run deploy/setup-github-actions-deploy.ps1 (needs gcloud auth login + gh auth login)

name: Deploy Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Cloud Build deploy
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project=exalted-splicer-499401-e2 \
            --substitutions=COMMIT_SHA=${{ github.sha }}
